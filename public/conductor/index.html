<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVAPACK - Panel Conductor</title>
    <link rel="icon" href="../favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        @font-face { font-family: 'Xenotron'; src: url('../Xenotron.woff2') format('woff2'); }
        :root {
            --bg: #0a0a0a; --bg-card: #141416; --border: #2a2a2d;
            --brand: #FF6600; --brand-dark: #cc5200;
            --green: #4CAF50; --red: #FF3B30; --yellow: #FFC107; --blue: #2196F3;
            --text: #e4e4e7; --text-dim: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* LOGIN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-logo { font-family: 'Xenotron', sans-serif; font-size: 3rem; color: var(--brand); margin-bottom: 8px; }
        .login-logo span { color: var(--red); font-family: sans-serif; font-weight: 900; }
        .login-subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 40px; letter-spacing: 2px; text-transform: uppercase; }
        .pin-container { display: flex; gap: 12px; margin-bottom: 30px; }
        .pin-digit { width: 56px; height: 64px; text-align: center; font-size: 1.8rem; font-weight: 800; background: var(--bg-card); border: 2px solid var(--border); color: var(--text); border-radius: 12px; outline: none; caret-color: var(--brand); }
        .pin-digit:focus { border-color: var(--brand); box-shadow: 0 0 15px rgba(255,102,0,0.3); }
        .pin-error { color: var(--red); font-size: 0.85rem; min-height: 24px; margin-bottom: 10px; }
        .pin-hint { color: var(--text-dim); font-size: 0.75rem; }

        /* MAIN APP */
        #app-screen { display: none; }
        .app-header { background: linear-gradient(135deg, #0d0d1a, #1a1a2e); padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .app-header .logo { font-family: 'Xenotron', sans-serif; font-size: 1.1rem; color: var(--brand); }
        .app-header .logo span { color: var(--red); font-family: sans-serif; font-weight: 900; }
        .app-header .title { font-weight: 700; font-size: 0.85rem; color: #fff; letter-spacing: 0.5px; }
        .app-header .spacer { flex: 1; }
        .btn-logout { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 5px 14px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .btn-logout:hover { background: rgba(255,59,48,0.15); }

        /* ROUTE LIST */
        .route-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; padding: 20px; }
        .route-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
        .route-card:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,102,0,0.15); }
        .route-card-header { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .route-card-icon { width: 44px; height: 44px; border-radius: 10px; background: linear-gradient(135deg, var(--brand), var(--brand-dark)); display: flex; align-items: center; justify-content: center; }
        .route-card-icon .material-symbols-outlined { color: #fff; font-size: 1.4rem; }
        .route-card-name { font-weight: 700; font-size: 1rem; }
        .route-card-driver { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }
        .route-card-stats { display: flex; padding: 12px 16px; gap: 12px; }
        .stat { flex: 1; text-align: center; }
        .stat-num { font-size: 1.4rem; font-weight: 900; }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        .progress-bar { height: 4px; background: #222; border-radius: 2px; margin: 0 16px 12px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green), #66BB6A); border-radius: 2px; transition: width 0.5s; }

        /* ROUTE DETAIL */
        #route-detail { display: none; }
        .detail-header { background: linear-gradient(135deg, #001f3f, #003366); padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .btn-back:hover { background: rgba(255,255,255,0.2); }
        .detail-title { color: var(--brand); font-size: 1.1rem; font-weight: 800; }
        .detail-driver { color: #aaa; font-size: 0.8rem; }
        .btn-print-all { background: linear-gradient(135deg, var(--green), #2E7D32); border: none; color: #fff; padding: 8px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-left: auto; letter-spacing: 0.5px; }
        .btn-print-all:hover { filter: brightness(1.1); }

        .ticket-list { padding: 16px; }
        .ticket-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; transition: all 0.2s; flex-wrap: wrap; }
        .ticket-row:hover { border-color: #444; }
        .ticket-id { font-weight: 900; font-size: 0.9rem; color: var(--brand); min-width: 120px; }
        .ticket-receiver { flex: 1; min-width: 150px; }
        .ticket-receiver-name { font-weight: 700; font-size: 0.85rem; }
        .ticket-receiver-addr { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }
        .ticket-province { background: rgba(255,102,0,0.15); color: var(--brand); padding: 3px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .ticket-status { padding: 3px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: rgba(255,152,0,0.15); color: var(--yellow); }
        .status-delivered { background: rgba(76,175,80,0.15); color: var(--green); }
        .status-incident { background: rgba(255,59,48,0.15); color: var(--red); }
        .ticket-bultos { font-weight: 700; font-size: 0.8rem; min-width: 60px; text-align: center; }
        .btn-print { background: linear-gradient(135deg, var(--blue), #1565C0); border: none; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .btn-print:hover { filter: brightness(1.15); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
        .empty-state .material-symbols-outlined { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; display: block; }
        .loading { text-align: center; padding: 40px; color: var(--text-dim); }

        /* PRINT STYLES */
        #print-area { display: none; }
        @media print {
            body * { visibility: hidden !important; }
            #print-area, #print-area * { visibility: visible !important; }
            #print-area { display: block !important; position: absolute; top: 0; left: 0; width: 100%; background: white; }
            @page { size: A4 portrait; margin: 5mm; }
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .route-grid { grid-template-columns: 1fr; padding: 12px; gap: 12px; }
            .ticket-row { padding: 10px 12px; }
            .detail-header { padding: 10px 14px; }
            .btn-print-all { margin-left: 0; margin-top: 8px; width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
    <div class="login-logo">NOVAPACK<span>&#10148;</span></div>
    <div class="login-subtitle">Panel Conductor</div>
    <div class="pin-container">
        <input type="tel" class="pin-digit" maxlength="1" inputmode="numeric" autofocus>
        <input type="tel" class="pin-digit" maxlength="1" inputmode="numeric">
        <input type="tel" class="pin-digit" maxlength="1" inputmode="numeric">
        <input type="tel" class="pin-digit" maxlength="1" inputmode="numeric">
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-hint">Introduce el PIN de conductor</div>
</div>

<!-- MAIN APP -->
<div id="app-screen">
    <div class="app-header">
        <div class="logo">NOVAPACK<span>&#10148;</span></div>
        <div class="title">PANEL CONDUCTOR</div>
        <div class="spacer"></div>
        <button class="btn-logout" onclick="logout()">
            <span class="material-symbols-outlined" style="font-size:1rem;">logout</span> Salir
        </button>
    </div>

    <!-- ROUTE LIST VIEW -->
    <div id="route-list">
        <div class="route-grid" id="route-grid">
            <div class="loading"><span class="material-symbols-outlined" style="animation: spin 1s linear infinite;">sync</span><br>Cargando rutas...</div>
        </div>
    </div>

    <!-- ROUTE DETAIL VIEW -->
    <div id="route-detail">
        <div class="detail-header">
            <button class="btn-back" onclick="showRouteList()">
                <span class="material-symbols-outlined" style="font-size:1rem;">arrow_back</span> Rutas
            </button>
            <div>
                <div class="detail-title" id="detail-title">Ruta: ...</div>
                <div class="detail-driver" id="detail-driver"></div>
            </div>
            <button class="btn-print-all" onclick="printAllTickets()">
                <span class="material-symbols-outlined" style="font-size:1.1rem;">print</span> IMPRIMIR TODOS
            </button>
        </div>
        <div class="ticket-list" id="ticket-list"></div>
    </div>
</div>

<!-- PRINT AREA (hidden, used for printing) -->
<div id="print-area"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="conductor.js"></script>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
