<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Diagnostic Page</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #111; color: white; font-family: monospace; padding: 20px; }
        #log { white-space: pre-wrap; word-wrap: break-word; }
        .error { color: #ff4444; font-weight: bold; font-size: 1.2rem; }
        .success { color: #00ff00; }
        .info { color: #00ccff; }
    </style>
</head>
<body>
    <h2>Firebase Diagnostic Tool</h2>
    <div id="log">Inicializando...<br></div>

    <script src="firebase-config.js"></script>
    <script>
        const logEl = document.getElementById('log');
        function print(msg, type="info") {
            logEl.innerHTML += `<span class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
            console.log(msg);
        }

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                print("No estás logueado. Redirigiendo a index.html...", "error");
                setTimeout(() => window.location.href="index.html", 2000);
                return;
            }
            print(`Autenticado como: ${user.email} (UID: ${user.uid})`, "success");

            try {
                // Fetch user data logic
                const userDoc = await db.collection('users').doc(user.uid).get();
                let userData = userDoc.exists ? userDoc.data() : null;
                
                if (!userData) {
                    const emailDoc = await db.collection('users').doc(user.email).get();
                    userData = emailDoc.exists ? emailDoc.data() : null;
                }

                if (!userData) {
                    print("No se encontró perfil de usuario en la BD.", "error");
                    userData = { email: user.email };
                } else {
                    print(`Perfil cargado: ${userData.name || 'Sin Nombre'} (ID: ${userData.idNum || 'Ninguno'})`);
                }

                const identityIds = [user.uid, userData.email, userData.idNum].filter(Boolean);
                const idVariants = [user.uid];
                const finalVariants = [...new Set([...idVariants, ...identityIds])].slice(0, 10);

                print(`Intentando buscar tickets con clientIdNum IN [${finalVariants.join(', ')}]...`);

                // First active query
                const snap = await db.collection('tickets').where('clientIdNum', 'in', finalVariants).limit(20).get();
                print(`✅ EXITO: La búsqueda de clientIdNum devolvió ${snap.docs.length} tickets.`, "success");

                // Fallback query
                print(`Intentando búsqueda de respaldo uid IN...`);
                const snap2 = await db.collection('tickets').where('uid', 'in', finalVariants).limit(20).get();
                print(`✅ EXITO: La búsqueda de uid devolvió ${snap2.docs.length} tickets.`, "success");

                // GetNextId Query test
                print(`Probando query de creación de nuevo albarán (getNextId)...`);
                const snap3 = await db.collection('tickets').where('clientIdNum', 'in', finalVariants).limit(10).get();
                print(`✅ EXITO: La búsqueda getNextId no se colgó.`, "success");

            } catch (error) {
                print(`❌ ERROR FATAL DE FIREBASE: ${error.message}`, "error");
                print(`DETALLES: ${error.code}`, "error");
            }
        });
    </script>
</body>
</html>
